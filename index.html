<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DietaCALC</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f060;
    --accent2: #60d0f0;
    --danger: #f06060;
    --text: #f0f0f0;
    --text2: #888;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--text2); font-weight: 400; }

  .target-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .target-btn:hover { border-color: var(--accent); color: var(--accent); }
  .target-btn .val { color: var(--text); font-weight: 500; }

  .summary {
    margin: 20px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .summary-date {
    font-size: 12px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .calorie-ring {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
  }

  .ring-wrap {
    position: relative;
    width: 100px;
    height: 100px;
    flex-shrink: 0;
  }

  .ring-wrap svg { transform: rotate(-90deg); width: 100px; height: 100px; }
  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 251;
    stroke-dashoffset: 251;
    transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1), stroke 0.3s;
  }

  .ring-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .ring-label .kcal-num {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    line-height: 1;
    color: var(--accent);
  }

  .ring-label .kcal-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; }

  .summary-stats { flex: 1; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 13px; color: var(--text2); }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
  }

  .stat-value.green { color: var(--accent); }
  .stat-value.red { color: var(--danger); }
  .stat-value.blue { color: var(--accent2); }

  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
    max-width: 100%;
  }

  .progress-fill.over { background: var(--danger); }

  .input-area {
    margin: 0 16px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .input-area h3 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .meal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 80px;
  }

  .meal-input:focus { border-color: var(--accent); }
  .meal-input::placeholder { color: var(--text2); }

  .input-actions { display: flex; justify-content: flex-end; margin-top: 10px; }

  .btn-add {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 10px 22px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-add:hover { background: #d4f570; transform: translateY(-1px); }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .meals-section { margin: 0 16px; }

  .meals-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .meals-header h3 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .meal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .meal-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .meal-desc { font-size: 14px; line-height: 1.5; flex: 1; }

  .meal-kcal {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
    white-space: nowrap;
  }

  .meal-kcal span { font-size: 11px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-weight: 400; }
  .meal-time { font-size: 11px; color: var(--text2); margin-top: 4px; }

  .meal-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .btn-small {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-small:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-small.danger:hover { border-color: var(--danger); color: var(--danger); }

  .edit-row { display: flex; gap: 8px; margin-top: 8px; }

  .edit-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
  }

  .edit-kcal {
    width: 80px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 7px;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 10px;
    outline: none;
    text-align: center;
  }

  .btn-save {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 7px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
  }

  .history-section { margin: 20px 16px 0; }

  .history-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
  }

  .history-toggle:hover { border-color: var(--accent2); color: var(--text); }
  .history-content { display: none; margin-top: 10px; }
  .history-content.open { display: block; }

  .history-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }

  .history-day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .history-day-date { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; }
  .history-day-total { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--accent2); }

  .history-meal-item {
    font-size: 12px;
    color: var(--text2);
    padding: 3px 0;
    display: flex;
    justify-content: space-between;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }

  .modal h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 16px; }
  .modal label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }

  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    padding: 10px 14px;
    outline: none;
    margin-bottom: 16px;
  }

  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 8px 16px;
    cursor: pointer;
  }

  .btn-confirm {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 8px 20px;
    cursor: pointer;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #0f0f0f;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; color: var(--text2); font-size: 14px; padding: 30px 0; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    z-index: 300;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  @media (min-width: 600px) {
    body { max-width: 600px; margin: 0 auto; padding-bottom: 40px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Dieta<span>CALC</span></div>
  <button class="target-btn" onclick="openTargetModal()">
    🎯 Target: <span class="val" id="targetDisplay">2000</span> kcal
  </button>
</header>

<div class="summary">
  <div class="summary-date" id="summaryDate">Oggi</div>
  <div class="calorie-ring">
    <div class="ring-wrap">
      <svg viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="40"/>
        <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="40"/>
      </svg>
      <div class="ring-label">
        <div class="kcal-num" id="ringNum">0</div>
        <div class="kcal-lbl">consumate</div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-row">
        <span class="stat-label">Target</span>
        <span class="stat-value" id="statTarget">2000 kcal</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Consumate</span>
        <span class="stat-value green" id="statConsumed">0 kcal</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Rimanenti</span>
        <span class="stat-value blue" id="statRemaining">2000 kcal</span>
      </div>
    </div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="input-area">
  <h3>➕ Aggiungi pasto</h3>
  <textarea
    class="meal-input"
    id="mealInput"
    placeholder="Es: colazione con 2 uova, toast e caffè con latte..."
  ></textarea>
  <div class="input-actions">
    <button class="btn-add" id="addBtn" onclick="addMeal()">
      <span id="addBtnText">Stima calorie</span>
    </button>
  </div>
</div>

<div class="meals-section">
  <div class="meals-header">
    <h3>📋 Pasti di oggi</h3>
  </div>
  <div id="mealsList">
    <div class="empty-state">Nessun pasto registrato oggi</div>
  </div>
</div>

<div class="history-section">
  <button class="history-toggle" onclick="toggleHistory()">
    📅 Storico giorni passati
    <span id="historyArrow">▼</span>
  </button>
  <div class="history-content" id="historyContent">
    <div id="historyList" style="color:var(--text2);font-size:14px;padding:10px 0;">Caricamento...</div>
  </div>
</div>

<div class="modal-overlay" id="targetModal">
  <div class="modal">
    <h3>🎯 Imposta Target</h3>
    <label>Calorie giornaliere obiettivo</label>
    <input type="number" id="targetInput" placeholder="Es: 2000" min="500" max="5000"/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeTargetModal()">Annulla</button>
      <button class="btn-confirm" onclick="saveTarget()">Salva</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, where, Timestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD3PloHq1QBf4s2aqNpoxt_unuCrm8CovA",
    authDomain: "dietacalc-c9af5.firebaseapp.com",
    projectId: "dietacalc-c9af5",
    storageBucket: "dietacalc-c9af5.firebasestorage.app",
    messagingSenderId: "139675635267",
    appId: "1:139675635267:web:2984311db08f3107918ef6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let target = parseInt(localStorage.getItem('dietacalc_target') || '2000');
  let todayMeals = [];
  let historyOpen = false;

  window.addEventListener('DOMContentLoaded', () => {
    updateTargetDisplay();
    loadTodayMeals();
    updateSummaryDate();
  });

  function updateSummaryDate() {
    const now = new Date();
    const opts = { weekday: 'long', day: 'numeric', month: 'long' };
    document.getElementById('summaryDate').textContent =
      now.toLocaleDateString('it-IT', opts).replace(/^\w/, c => c.toUpperCase());
  }

  window.openTargetModal = () => {
    document.getElementById('targetInput').value = target;
    document.getElementById('targetModal').classList.add('open');
  };

  window.closeTargetModal = () => {
    document.getElementById('targetModal').classList.remove('open');
  };

  window.saveTarget = () => {
    const val = parseInt(document.getElementById('targetInput').value);
    if (val >= 500 && val <= 5000) {
      target = val;
      localStorage.setItem('dietacalc_target', target);
      updateTargetDisplay();
      updateSummaryUI();
      closeTargetModal();
      showToast('Target aggiornato!', 'success');
    } else {
      showToast('Inserisci un valore tra 500 e 5000', 'error');
    }
  };

  function updateTargetDisplay() {
    document.getElementById('targetDisplay').textContent = target;
    document.getElementById('statTarget').textContent = target + ' kcal';
  }

  async function loadTodayMeals() {
    const today = getTodayString();
    const q = query(
      collection(db, 'meals'),
      where('date', '==', today),
      orderBy('timestamp', 'asc')
    );
    try {
      const snap = await getDocs(q);
      todayMeals = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderMeals();
      updateSummaryUI();
    } catch(e) {
      showToast('Errore caricamento dati: ' + e.message, 'error');
    }
  }

  window.addMeal = async () => {
    const input = document.getElementById('mealInput');
    const text = input.value.trim();
    if (!text) return showToast('Descrivi cosa hai mangiato', 'error');

    const btn = document.getElementById('addBtn');
    const btnText = document.getElementById('addBtnText');
    btn.disabled = true;
    btnText.innerHTML = '<div class="spinner"></div>';

    try {
      const kcal = await estimateCalories(text);
      const meal = {
        description: text,
        calories: kcal,
        date: getTodayString(),
        timestamp: Timestamp.now()
      };
      const docRef = await addDoc(collection(db, 'meals'), meal);
      todayMeals.push({ id: docRef.id, ...meal });
      input.value = '';
      renderMeals();
      updateSummaryUI();
      showToast(`+${kcal} kcal aggiunte!`, 'success');
    } catch(e) {
      showToast('Errore: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btnText.textContent = 'Stima calorie';
    }
  };

  async function estimateCalories(description) {
    const resp = await fetch('/api/estimate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description })
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || 'Errore server');
    }
    const data = await resp.json();
    return data.calories;
  }

  function renderMeals() {
    const container = document.getElementById('mealsList');
    if (todayMeals.length === 0) {
      container.innerHTML = '<div class="empty-state">Nessun pasto registrato oggi</div>';
      return;
    }
    container.innerHTML = todayMeals.map((m, i) => `
      <div class="meal-card" id="card-${i}">
        <div class="meal-top">
          <div>
            <div class="meal-desc">${escHtml(m.description)}</div>
            <div class="meal-time">${formatTime(m.timestamp)}</div>
          </div>
          <div class="meal-kcal">${m.calories}<span> kcal</span></div>
        </div>
        <div id="edit-${i}" style="display:none">
          <div class="edit-row">
            <input class="edit-input" id="editDesc-${i}" value="${escHtml(m.description)}"/>
            <input class="edit-kcal" id="editKcal-${i}" type="number" value="${m.calories}"/>
            <button class="btn-save" onclick="saveMeal(${i})">✓</button>
          </div>
        </div>
        <div class="meal-actions">
          <button class="btn-small" onclick="toggleEdit(${i})">✏️ Modifica</button>
          <button class="btn-small danger" onclick="deleteMeal(${i})">🗑️ Elimina</button>
        </div>
      </div>
    `).join('');
  }

  window.toggleEdit = (i) => {
    const el = document.getElementById(`edit-${i}`);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  };

  window.saveMeal = async (i) => {
    const meal = todayMeals[i];
    const newDesc = document.getElementById(`editDesc-${i}`).value.trim();
    const newKcal = parseInt(document.getElementById(`editKcal-${i}`).value);
    if (!newDesc || isNaN(newKcal)) return showToast('Dati non validi', 'error');
    try {
      await updateDoc(doc(db, 'meals', meal.id), { description: newDesc, calories: newKcal });
      todayMeals[i].description = newDesc;
      todayMeals[i].calories = newKcal;
      renderMeals();
      updateSummaryUI();
      showToast('Pasto aggiornato', 'success');
    } catch(e) {
      showToast('Errore aggiornamento', 'error');
    }
  };

  window.deleteMeal = async (i) => {
    const meal = todayMeals[i];
    try {
      await deleteDoc(doc(db, 'meals', meal.id));
      todayMeals.splice(i, 1);
      renderMeals();
      updateSummaryUI();
      showToast('Pasto eliminato', 'success');
    } catch(e) {
      showToast('Errore eliminazione', 'error');
    }
  };

  function updateSummaryUI() {
    const consumed = todayMeals.reduce((s, m) => s + m.calories, 0);
    const remaining = target - consumed;
    const pct = Math.min(consumed / target, 1);
    const over = consumed > target;

    document.getElementById('ringNum').textContent = consumed;
    document.getElementById('statConsumed').textContent = consumed + ' kcal';
    document.getElementById('statRemaining').textContent =
      (over ? '+' : '') + Math.abs(remaining) + (over ? ' kcal over!' : ' kcal');
    document.getElementById('statRemaining').className =
      'stat-value ' + (over ? 'red' : 'blue');

    const circumference = 251;
    document.getElementById('ringFill').style.strokeDashoffset =
      circumference - (circumference * pct);
    document.getElementById('ringFill').style.stroke =
      over ? 'var(--danger)' : 'var(--accent)';

    const bar = document.getElementById('progressFill');
    bar.style.width = (pct * 100) + '%';
    bar.className = 'progress-fill' + (over ? ' over' : '');
  }

  window.toggleHistory = async () => {
    historyOpen = !historyOpen;
    const content = document.getElementById('historyContent');
    document.getElementById('historyArrow').textContent = historyOpen ? '▲' : '▼';
    content.className = 'history-content' + (historyOpen ? ' open' : '');
    if (historyOpen) await loadHistory();
  };

  async function loadHistory() {
    const container = document.getElementById('historyList');
    container.innerHTML = '<div style="color:var(--text2);font-size:14px;padding:10px 0">Caricamento...</div>';
    try {
      const today = getTodayString();
      const q = query(collection(db, 'meals'), orderBy('timestamp', 'desc'));
      const snap = await getDocs(q);
      const byDay = {};
      snap.docs.forEach(d => {
        const m = { id: d.id, ...d.data() };
        if (m.date === today) return;
        if (!byDay[m.date]) byDay[m.date] = [];
        byDay[m.date].push(m);
      });
      const days = Object.keys(byDay).sort().reverse();
      if (days.length === 0) {
        container.innerHTML = '<div style="color:var(--text2);font-size:14px;padding:10px 0">Nessuno storico disponibile</div>';
        return;
      }
      container.innerHTML = days.map(day => {
        const meals = byDay[day];
        const total = meals.reduce((s, m) => s + m.calories, 0);
        return `
          <div class="history-day">
            <div class="history-day-header">
              <span class="history-day-date">${formatDate(day)}</span>
              <span class="history-day-total">${total} kcal</span>
            </div>
            ${meals.map(m => `
              <div class="history-meal-item">
                <span>${escHtml(m.description.substring(0,50))}${m.description.length>50?'…':''}</span>
                <span>${m.calories} kcal</span>
              </div>
            `).join('')}
          </div>
        `;
      }).join('');
    } catch(e) {
      container.innerHTML = '<div style="color:var(--danger);font-size:14px;">Errore caricamento storico</div>';
    }
  }

  function getTodayString() {
    return new Date().toISOString().split('T')[0];
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  }

  function formatDate(str) {
    const d = new Date(str + 'T12:00:00');
    return d.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }
</script>
</body>
</html>
